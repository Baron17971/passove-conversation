<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>בין פסח ל&quot;שאגת הארי&quot;</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&family=Secular+One&display=swap');

    :root {
      --sky-top: #f4fff2;
      --sky-bottom: #e9f8ff;
      --text: #5a3740;
      --muted: #7a5962;
      --primary: #d06a8f;
      --primary-2: #e493b0;
      --accent: #ffd166;
      --surface: rgba(255, 255, 255, 0.84);
      --surface-strong: rgba(255, 255, 255, 0.96);
      --card-back-1: #c66a8c;
      --card-back-2: #df93b1;
      --shadow: 0 18px 40px rgba(109, 68, 83, 0.18);
      --radius: 22px;
      --page-photo: url('./assets/ant7119_a_delicate_watercolor_flowers_pink_tones_high_resolut_cc02b3aa-fc34-455e-b7e9-b1e4cf255eaf_0.png');
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Heebo', sans-serif;
      background-color: #fdf7f9;
      color: var(--text);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(160deg, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.52)),
        var(--page-photo);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      z-index: -2;
      filter: saturate(1.03) brightness(1.01);
    }

    .container {
      max-width: 1300px;
      margin: 24px auto;
      padding: 26px;
      border-radius: 32px;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.75);
      box-shadow: 0 20px 55px rgba(117, 74, 89, 0.18);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .hero {
      text-align: center;
      padding: 20px 12px 8px;
    }

    h1 {
      margin: 0 0 10px;
      font-family: 'Secular One', 'Heebo', sans-serif;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: 0.4px;
      color: #8a3e5d;
      text-shadow: 0 6px 16px rgba(255, 255, 255, 0.7);
    }

    .subtitle {
      margin: 0 auto 18px;
      max-width: 800px;
      line-height: 1.7;
      font-size: 1.05rem;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 18px;
    }

    button {
      border: 1px solid rgba(255, 255, 255, 0.65);
      border-radius: 999px;
      padding: 12px 20px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, filter 0.2s ease, background 0.25s ease;
    }

    button:hover {
      transform: translateY(-3px);
      filter: brightness(1.04);
    }

    .primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
    }

    .secondary {
      background: var(--surface-strong);
      color: var(--text);
    }

    button:focus-visible {
      outline: 3px solid rgba(208, 106, 143, 0.3);
      outline-offset: 2px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 18px;
      margin-top: 24px;
    }

    .card-wrap {
      perspective: 1200px;
      min-height: 180px;
    }

    .card {
      position: relative;
      width: 100%;
      height: 180px;
      --card-front-a: #fff8f9;
      --card-front-b: #fce4e8;
      --card-front-glow: rgba(255, 206, 210, 0.48);
      --card-border: rgba(207, 129, 147, 0.28);
      --card-number-a: #c86986;
      --card-number-b: #e09bb1;
      --card-back-a: #c16282;
      --card-back-b: #d88ea9;
      transform-style: preserve-3d;
      transition: transform 0.7s ease;
      cursor: pointer;
      animation: card-in 0.45s ease;
    }

    @keyframes card-in {
      from {
        opacity: 0;
        filter: blur(1px);
      }
      to {
        opacity: 1;
        filter: blur(0);
      }
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 18px;
    }

    .front {
      background:
        radial-gradient(circle at 84% 18%, var(--card-front-glow), transparent 36%),
        linear-gradient(145deg, var(--card-front-a), var(--card-front-b));
      border: 2px solid var(--card-border);
      flex-direction: column;
      gap: 12px;
    }

    .front .number {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(140deg, var(--card-number-a), var(--card-number-b));
      color: white;
      font-size: 1.2rem;
      font-weight: 800;
      box-shadow: 0 10px 20px rgba(166, 91, 116, 0.28);
    }

    .front .label {
      font-size: 1rem;
      font-weight: 700;
    }

    .front .hint {
      font-size: 0.92rem;
      opacity: 0.75;
    }

    .back {
      background: linear-gradient(145deg, var(--card-back-a), var(--card-back-b));
      color: white;
      transform: rotateY(180deg);
      line-height: 1.55;
      font-size: 1rem;
      font-weight: 700;
      border: 1px solid rgba(255, 255, 255, 0.18);
      text-shadow: 0 2px 8px rgba(88, 42, 58, 0.28);
    }

    .legend {
      margin: 18px auto 4px;
      text-align: center;
      font-size: 0.98rem;
      opacity: 0.95;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.72);
      width: fit-content;
      padding: 8px 14px;
      border-radius: 999px;
      box-shadow: 0 8px 20px rgba(49, 99, 73, 0.1);
    }

    .footer-note {
      margin-top: 24px;
      text-align: center;
      font-size: 0.95rem;
      opacity: 0.95;
      line-height: 1.7;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.72);
      border-radius: 16px;
      padding: 10px 14px;
    }

    .tagline {
      display: inline-block;
      background: var(--surface-strong);
      padding: 8px 14px;
      border-radius: 999px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
      font-size: 0.95rem;
    }

    @media (max-width: 1100px) {
      .board { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    @media (max-width: 860px) {
      .board { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      .board { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .card, .card-wrap { height: 170px; min-height: 170px; }
      .back { font-size: 0.96rem; }
      .front .hint { font-size: 0.86rem; }
      .container {
        margin: 10px;
        padding: 16px;
        border-radius: 22px;
      }

      body::before {
        background-attachment: scroll;
        background-position: 22% center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">

      <h1>בין פסח ל&quot;שאגת הארי&quot;</h1>

      <p class="subtitle">פותח ע&quot;י ענת ברון לוביש</p>
      <div class="controls">
        <button class="primary" onclick="shuffleCards()">ערבוב קלפים</button>
        <button class="secondary" onclick="flipAll(true)">פתיחת כל הקלפים</button>
        <button class="secondary" onclick="flipAll(false)">סגירת כל הקלפים</button>
      </div>
      <div class="legend">בחרו מספר שאלה. לא חובה לענות. אפשר לבחור קלף אחר או להעביר לחבר/ה</div>
    </section>

    <main class="board" id="board"></main>

    <div class="footer-note">
      טיפ למנחה: בחרי מראש 5–7 קלפים שמתאימים לאופי הכיתה, והשאירי תמיד אפשרות לענות במילה אחת,
      באימוג'י, או "מעדיפ/ה לא לענות".
    </div>
  </div>

  <script>
    const questions = [
      "אם התקופה האחרונה הייתה צבע – איזה צבע היא הייתה ולמה?",
      "מה הדבר הכי קטן שעזר לך להרגיש קצת יותר טוב השבוע?",
      "מה הכי קשה בלמידה בזום שאנשים לא תמיד מבינים?",
      "מה מורה יכול לעשות בזום כדי שתרגישו יותר שראו אתכם באמת?",
      "מה עדיף לך בימים כאלה – לדבר, לצחוק, להיות לבד או לעשות כאילו הכול רגיל?",
      "אם היית נותן כותרת לשבוע האחרון שלך – מה הייתה הכותרת?",
      "מה הדבר שהכי חסר לך מהשגרה הרגילה?",
      "איזה כוח גילית בעצמך בתקופה הזאת, אפילו אם הוא קטן?",
      "מה יותר מעייף אותך כרגע – המסכים, הלחץ, חוסר הוודאות או משהו אחר?",
      "אם היית יכול למחוק דאגה אחת מהראש לקראת פסח – מה היית בוחר?",
      "מתי אתה מרגיש באמת נוכח בשיעור, ומתי רק מחובר טכנית?",
      "מה נותן לך כרגע תחושת ביטחון, אפילו קטנה?",
      "אם הבית שלך היה מדבר על התקופה הזאת – מה הוא היה אומר?",
      "מה היית רוצה שמבוגרים יבינו על בני נוער בתקופה כזאת?",
      "מה משאיר אותך עם תקווה גם בימים פחות פשוטים?",
      "איזו שאלה היית רוצה שישאלו אותך יותר, ואיזו פחות?",
      "אם היית בונה 'ערכת חירום רגשית' לתלמידים – מה היה נכנס אליה?",
      "מה זו מבחינתך חירות דווקא עכשיו?",
      "מה היית רוצה להשאיר מאחור לפני פסח – מחשבה, הרגל או תחושה?",
      "איזה משפט היית רוצה שמישהו יגיד לך השבוע?"
    ];

    const board = document.getElementById('board');
    const cardPalettes = [
      {
        'card-front-a': '#fff8f9',
        'card-front-b': '#fce4e8',
        'card-front-glow': 'rgba(255, 206, 210, 0.48)',
        'card-border': 'rgba(207, 129, 147, 0.28)',
        'card-number-a': '#c86986',
        'card-number-b': '#e09bb1',
        'card-back-a': '#c16282',
        'card-back-b': '#d88ea9'
      },
      {
        'card-front-a': '#fff7f5',
        'card-front-b': '#f7dede',
        'card-front-glow': 'rgba(246, 192, 192, 0.45)',
        'card-border': 'rgba(198, 132, 132, 0.26)',
        'card-number-a': '#b95f73',
        'card-number-b': '#d98b9b',
        'card-back-a': '#b65772',
        'card-back-b': '#d48698'
      },
      {
        'card-front-a': '#fff9f6',
        'card-front-b': '#f6e2d7',
        'card-front-glow': 'rgba(232, 186, 169, 0.42)',
        'card-border': 'rgba(186, 140, 120, 0.28)',
        'card-number-a': '#b07260',
        'card-number-b': '#d1a08e',
        'card-back-a': '#a66d63',
        'card-back-b': '#c99a89'
      },
      {
        'card-front-a': '#fff9fb',
        'card-front-b': '#f0d8e4',
        'card-front-glow': 'rgba(224, 170, 198, 0.38)',
        'card-border': 'rgba(186, 132, 162, 0.28)',
        'card-number-a': '#a95c82',
        'card-number-b': '#cc8fb0',
        'card-back-a': '#9f567f',
        'card-back-b': '#c183a6'
      },
      {
        'card-front-a': '#fffaf8',
        'card-front-b': '#f0d8d8',
        'card-front-glow': 'rgba(236, 181, 181, 0.42)',
        'card-border': 'rgba(188, 128, 128, 0.26)',
        'card-number-a': '#b76472',
        'card-number-b': '#d7919d',
        'card-back-a': '#ad5b6f',
        'card-back-b': '#ce8597'
      },
      {
        'card-front-a': '#fff9f7',
        'card-front-b': '#f0e0d0',
        'card-front-glow': 'rgba(223, 190, 150, 0.35)',
        'card-border': 'rgba(176, 143, 106, 0.26)',
        'card-number-a': '#aa7c5f',
        'card-number-b': '#c9a285',
        'card-back-a': '#9d7558',
        'card-back-b': '#b9987a'
      }
    ];

    function buildPaletteSpread(count) {
      const indexes = [];
      while (indexes.length < count) {
        for (let i = 0; i < cardPalettes.length && indexes.length < count; i += 1) {
          indexes.push(i);
        }
      }

      for (let i = indexes.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [indexes[i], indexes[j]] = [indexes[j], indexes[i]];
      }

      return indexes.map((paletteIndex) => cardPalettes[paletteIndex]);
    }

    function applyCardPalette(card, palette) {
      Object.entries(palette).forEach(([token, value]) => {
        card.style.setProperty(`--${token}`, value);
      });
    }

    function createCard(question, index, palette) {
      const wrap = document.createElement('div');
      wrap.className = 'card-wrap';

      const card = document.createElement('div');
      card.className = 'card';
      card.setAttribute('tabindex', '0');
      card.setAttribute('role', 'button');
      card.setAttribute('aria-label', `קלף מספר ${index + 1}`);

      card.innerHTML = `
        <div class="card-face front">
          <div class="number">${index + 1}</div>

        </div>
        <div class="card-face back">${question}</div>
      `;

      applyCardPalette(card, palette);

      card.addEventListener('click', () => card.classList.toggle('flipped'));
      card.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          card.classList.toggle('flipped');
        }
      });

      wrap.appendChild(card);
      return wrap;
    }

    function renderCards(items) {
      board.innerHTML = '';
      const paletteSpread = buildPaletteSpread(items.length);
      items.forEach((q, i) => board.appendChild(createCard(q, i, paletteSpread[i])));
    }

    function shuffleCards() {
      const shuffled = [...questions]
        .map(value => ({ value, sort: Math.random() }))
        .sort((a, b) => a.sort - b.sort)
        .map(({ value }) => value);
      renderCards(shuffled);
    }

    function flipAll(open) {
      document.querySelectorAll('.card').forEach(card => {
        card.classList.toggle('flipped', open);
      });
    }

    renderCards(questions);
  </script>
  <!-- deploy-test: 2026-03-19 -->
</body>
</html>
